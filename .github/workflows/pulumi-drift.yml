name: Drift Detection

on:
  schedule:
    # Run every hour. Detects out-of-band changes to the cluster.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack to check"
        required: true
        default: "staging"
        type: choice
        options: [staging, prod]

env:
  PULUMI_STACK: ${{ github.event.inputs.stack || 'staging' }}

jobs:
  drift:
    name: Check drift (${{ github.event.inputs.stack || 'staging' }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for WIF
      issues: write     # needed to open drift issues

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Authenticate to GCP (staging)
        if: env.PULUMI_STACK == 'staging'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/88022157757/locations/global/workloadIdentityPools/github-actions/providers/github"
          service_account: "pulumi-backend@p2bid-staging-xc69rp.iam.gserviceaccount.com"

      - name: Authenticate to GCP (prod)
        if: env.PULUMI_STACK == 'prod'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "${{ vars.GCP_WIF_PROVIDER_PROD }}"
          service_account: "${{ vars.GCP_SA_PULUMI_PROD }}"

      - name: Set Pulumi backend URL
        run: |
          if [[ "$PULUMI_STACK" == "staging" ]]; then
            echo "PULUMI_BACKEND_URL=gs://p2bid-staging-xc69rp-infra-state" >> "$GITHUB_ENV"
          else
            echo "PULUMI_BACKEND_URL=${{ vars.GCP_STATE_BUCKET_PROD }}" >> "$GITHUB_ENV"
          fi

      - name: Run pulumi preview (drift check)
        id: drift
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
        run: |
          mkdir -p "${{ runner.temp }}"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "${{ runner.temp }}/kubeconfig"
          chmod 600 "${{ runner.temp }}/kubeconfig"
          export KUBECONFIG="${{ runner.temp }}/kubeconfig"

          set +e
          pulumi preview \
            --stack "$PULUMI_STACK" \
            --diff \
            --non-interactive \
            --refresh \
            2>&1 | tee /tmp/drift.txt
          set -e

          # Detect REAL drift: resource-level lines with a plan action (not just refresh).
          # "(refresh)" means Pulumi synced its state — no change required.
          # Real drift has "(update)", "(create)", "(delete)", or "(replace)".
          if grep -qE '^\s*(\+\-|~|\+|-)\s+\S.*\((create|update|delete|replace)\)' /tmp/drift.txt; then
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
          fi

          # Extract only real plan-action resource lines (skip refresh-only and property noise)
          grep -E '^\s*(\+\-|~|\+|-)\s+\S.*\((create|update|delete|replace)\)' /tmp/drift.txt \
            | sed \
                -e 's/^[[:space:]]*+-/🔄 REPLACE/' \
                -e 's/^[[:space:]]*~/🟡 UPDATE /' \
                -e 's/^[[:space:]]*+/🟢 CREATE /' \
                -e 's/^[[:space:]]*-/🔴 DELETE /' \
            | head -60 > /tmp/drift_summary.txt

          # Count by action type
          CREATES=$(grep -c '^🟢' /tmp/drift_summary.txt || true)
          UPDATES=$(grep -c '^🟡' /tmp/drift_summary.txt || true)
          DELETES=$(grep -c '^🔴' /tmp/drift_summary.txt || true)
          REPLACES=$(grep -c '^🔄' /tmp/drift_summary.txt || true)

          # Build counts line
          COUNTS=""
          [ "$CREATES"  -gt 0 ] && COUNTS="$COUNTS 🟢 ${CREATES} to create ·"
          [ "$UPDATES"  -gt 0 ] && COUNTS="$COUNTS 🟡 ${UPDATES} to update ·"
          [ "$DELETES"  -gt 0 ] && COUNTS="$COUNTS 🔴 ${DELETES} to delete ·"
          [ "$REPLACES" -gt 0 ] && COUNTS="$COUNTS 🔄 ${REPLACES} to replace ·"
          COUNTS="${COUNTS% ·}"

          STACK="$PULUMI_STACK"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Build full issue body in bash to avoid YAML/backtick conflicts in JS
          {
            echo "DRIFT_ISSUE_BODY<<__ISSUE_EOF__"
            echo "## Drift detected on \`${STACK}\` stack"
            echo ""
            echo "Pulumi found resources that differ from the desired state in Git."
            echo "This usually means someone made out-of-band changes directly to the cluster."
            echo ""
            echo "**${COUNTS}**"
            echo ""
            echo "### Changed resources"
            echo ""
            echo '```'
            cat /tmp/drift_summary.txt
            echo '```'
            echo ""
            echo "### What to do"
            echo ""
            echo "- **Reconcile** — run \`pulumi up --stack ${STACK}\` to restore desired state"
            echo "- **Accept** — if the change was intentional, update the Pulumi code to match and open a PR"
            echo "- **Investigate** — check \`kubectl\` / cloud console for who made the change"
            echo ""
            echo "[View full run output](${RUN_URL})"
            echo ""
            echo "<details>"
            echo "<summary>Full <code>pulumi preview --diff --refresh</code> output</summary>"
            echo ""
            echo '```'
            head -c 58000 /tmp/drift.txt
            echo ""
            echo '```'
            echo "</details>"
            echo "__ISSUE_EOF__"
          } >> "$GITHUB_ENV"

          # Build comment body for repeat-drift updates
          {
            echo "DRIFT_COMMENT_BODY<<__COMMENT_EOF__"
            echo "### Drift still present — ${NOW}"
            echo ""
            echo "**${COUNTS}**"
            echo ""
            echo '```'
            cat /tmp/drift_summary.txt
            echo '```'
            echo ""
            echo "[Run details](${RUN_URL})"
            echo "__COMMENT_EOF__"
          } >> "$GITHUB_ENV"

      - name: Open GitHub issue if drift detected
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const stack      = process.env.PULUMI_STACK;
            const issueBody  = process.env.DRIFT_ISSUE_BODY;
            const commentBody = process.env.DRIFT_COMMENT_BODY;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: ['drift', 'stack:' + stack],
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: existing.data[0].number,
                body:         commentBody,
              });
            } else {
              await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title:  '\u26a0\ufe0f Infrastructure drift detected \u2014 ' + stack,
                labels: ['drift', 'stack:' + stack, 'infrastructure'],
                body:   issueBody,
              });
            }

      - name: Close resolved drift issues
        if: steps.drift.outputs.drift_detected == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const stack = process.env.PULUMI_STACK;
            const issues = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              state:  'open',
              labels: ['drift', 'stack:' + stack],
            });

            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.number,
                body:         '\u2705 Drift resolved \u2014 no changes detected as of ' + new Date().toISOString(),
              });
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.number,
                state:        'closed',
              });
            }
