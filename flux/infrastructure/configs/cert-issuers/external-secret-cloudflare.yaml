apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        # GCP Secret Manager secret name: test-staging-cloudflare-api-token
        # Create with: gcloud secrets create test-staging-cloudflare-api-token --data-file=-
        key: test-staging-cloudflare-api-token
