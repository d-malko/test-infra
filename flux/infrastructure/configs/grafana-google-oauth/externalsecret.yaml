apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-google-oauth
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: grafana-google-oauth
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        # GCP secret format: JSON with fields client_id and client_secret
        # gcloud secrets versions access latest --secret=p2bid-staging-grafana-google-oauth
        key: p2bid-staging-grafana-google-oauth
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: p2bid-staging-grafana-google-oauth
        property: client_secret
