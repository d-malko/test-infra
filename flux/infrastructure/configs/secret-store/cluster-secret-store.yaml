apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: "${gcp_project_id}"
      # No auth block needed — ESO uses Application Default Credentials (ADC).
      # ADC is configured via GOOGLE_APPLICATION_CREDENTIALS env var in the
      # ESO deployment, pointing to the WIF credential config JSON.
      # The credential config exchanges the projected K8s SA token for a
      # short-lived GCP access token via Workload Identity Federation.
