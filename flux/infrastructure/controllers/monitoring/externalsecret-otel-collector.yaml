apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: otel-collector-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: otel-collector-secret
    creationPolicy: Owner
  data:
    - secretKey: bearer-token
      remoteRef:
        # Pre-provisioned for IF-66 (Cloudflare Access auth on otel.p2bid.global).
        # This secret is NOT yet mounted by the OTel Collector — it will be consumed
        # by the Gateway/Cloudflare Access layer when IF-66 is implemented.
        # Rotate every 30 days maximum once in use.
        # gcloud secrets create p2bid-staging-otel-collector-bearer-token --data-file=-
        key: p2bid-staging-otel-collector-bearer-token
