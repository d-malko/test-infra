apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "69.*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      interval: 24h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # ── Talos: these control-plane endpoints are not exposed ──────────────────
    kubeEtcd:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    # Cilium replaces kube-proxy
    kubeProxy:
      enabled: false

    # ── Prometheus ────────────────────────────────────────────────────────────
    prometheus:
      prometheusSpec:
        retention: 30d
        retentionSize: "18GB"
        # Pick up all ServiceMonitors and PodMonitors cluster-wide
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 2Gi

    # ── Alertmanager ──────────────────────────────────────────────────────────
    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 2Gi
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi
        # Allow AlertmanagerConfig resources from any namespace
        alertmanagerConfigSelector: {}
        alertmanagerConfigNamespaceSelector: {}
        alertmanagerConfigMatcherStrategy:
          type: None

    # ── Grafana ───────────────────────────────────────────────────────────────
    grafana:
      admin:
        existingSecret: grafana-admin-secret
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: true
        storageClassName: local-path
        size: 5Gi
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 512Mi
      # Loki datasource — added here so Grafana picks it up at startup
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy
          isDefault: false
      # Expose via Gateway API — disable built-in ingress
      ingress:
        enabled: false
      service:
        type: ClusterIP
      grafana.ini:
        server:
          domain: grafana.p2bid.global
          root_url: https://grafana.p2bid.global
          serve_from_sub_path: false

    # ── node-exporter ─────────────────────────────────────────────────────────
    prometheus-node-exporter:
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          memory: 128Mi

    # ── kube-state-metrics ────────────────────────────────────────────────────
    kube-state-metrics:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
