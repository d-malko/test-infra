apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "69.*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      interval: 24h
  timeout: 10m
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # ── Talos: these control-plane endpoints are not exposed ──────────────────
    kubeEtcd:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    # Cilium replaces kube-proxy
    kubeProxy:
      enabled: false

    # ── Prometheus ────────────────────────────────────────────────────────────
    prometheus:
      prometheusSpec:
        retention: 30d
        retentionSize: "18GB"
        # Pick up all ServiceMonitors and PodMonitors cluster-wide
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 2Gi

    # ── Alertmanager ──────────────────────────────────────────────────────────
    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 2Gi
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi
        # Allow AlertmanagerConfig resources from any namespace
        alertmanagerConfigSelector: {}
        alertmanagerConfigNamespaceSelector: {}
        alertmanagerConfigMatcherStrategy:
          type: None

    # ── Grafana ───────────────────────────────────────────────────────────────
    grafana:
      admin:
        existingSecret: grafana-admin-secret
        userKey: admin-user
        passwordKey: admin-password
      # Inject OAuth client credentials as env vars — referenced in grafana.ini
      # via $__env{} to avoid storing secrets in plain values
      env:
        GF_AUTH_GOOGLE_CLIENT_ID:
          valueFrom:
            secretKeyRef:
              name: grafana-google-oauth
              key: client_id
        GF_AUTH_GOOGLE_CLIENT_SECRET:
          valueFrom:
            secretKeyRef:
              name: grafana-google-oauth
              key: client_secret
      persistence:
        enabled: true
        storageClassName: local-path
        size: 5Gi
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 512Mi
      # Loki datasource — added here so Grafana picks it up at startup
      additionalDataSources:
        - name: Loki
          type: loki
          uid: loki   # explicit UID required for cross-datasource linking from Tempo
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy
          isDefault: false
        - name: Tempo
          type: tempo
          uid: tempo
          url: http://tempo.monitoring.svc.cluster.local:3200
          access: proxy
          isDefault: false
          jsonData:
            # Requires uid: loki above — Grafana resolves datasources by UID, not name
            tracesToLogsV2:
              datasourceUid: loki
              spanStartTimeShift: "-1m"
              spanEndTimeShift: "1m"
              filterByTraceID: true
              filterBySpanID: false
            # kube-prometheus-stack 69.x provisions the built-in DS with uid: prometheus
            tracesToMetrics:
              datasourceUid: prometheus
            # Enable TraceQL search
            search:
              hide: false
            nodeGraph:
              enabled: true
      # Expose via Gateway API — disable built-in ingress
      ingress:
        enabled: false
      service:
        type: ClusterIP
      grafana.ini:
        server:
          domain: grafana.test.global
          root_url: https://grafana.test.global
          serve_from_sub_path: false
        auth.google:
          enabled: true
          client_id: $__env{GF_AUTH_GOOGLE_CLIENT_ID}
          client_secret: $__env{GF_AUTH_GOOGLE_CLIENT_SECRET}
          scopes: openid email profile
          auth_url: https://accounts.google.com/o/oauth2/auth
          token_url: https://oauth2.googleapis.com/token
          api_url: https://openidconnect.googleapis.com/v1/userinfo
          allowed_domains: test.global
          allow_sign_up: true
          # Uncomment after confirming OAuth works — disables username/password form
          # disable_login_form: true

    # ── node-exporter ─────────────────────────────────────────────────────────
    prometheus-node-exporter:
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          memory: 128Mi

    # ── kube-state-metrics ────────────────────────────────────────────────────
    kube-state-metrics:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
