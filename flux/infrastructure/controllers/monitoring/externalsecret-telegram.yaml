apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-telegram-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-telegram-secret
    creationPolicy: Owner
  data:
    - secretKey: bot-token
      remoteRef:
        # gcloud secrets create test-staging-telegram-bot-token --data-file=-
        # Value format: <bot-token>   (from @BotFather, e.g. 123456:ABCdef...)
        key: test-staging-telegram-bot-token
    - secretKey: chat-id
      remoteRef:
        # gcloud secrets create test-staging-telegram-chat-id --data-file=-
        # Value format: numeric chat ID (e.g. -1001234567890 for a group/channel)
        key: test-staging-telegram-chat-id
