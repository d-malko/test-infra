apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: loki
      version: "6.*"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Single-binary mode — right-sized for a single-node cluster
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      limits_config:
        retention_period: 168h   # 7 days — keeps disk usage bounded

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: local-path
        size: 20Gi
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 512Mi

    # Disable components not needed in single-binary mode
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0

    # Disable Minio (using filesystem storage)
    minio:
      enabled: false

    # Disable Grafana agent (using Promtail instead)
    gateway:
      enabled: false
