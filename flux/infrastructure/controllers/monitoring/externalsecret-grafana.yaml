---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        # gcloud secrets create test-staging-grafana-admin-user --data-file=-
        key: test-staging-grafana-admin-user
    - secretKey: admin-password
      remoteRef:
        # gcloud secrets create test-staging-grafana-admin-password --data-file=-
        key: test-staging-grafana-admin-password
