apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: tempo
      version: "1.*"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  timeout: 10m
  values:
    tempo:
      # 30-day trace retention — keep disk usage bounded
      retention: 720h

      storage:
        trace:
          backend: local
          local:
            path: /var/tempo/blocks
          wal:
            path: /var/tempo/wal

      # OTLP receivers on 4317/4318 — both in-cluster only, no public exposure.
      # NetworkPolicy tempo-ingress restricts ingress to OTel Collector only.
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    persistence:
      enabled: true
      storageClassName: local-path
      size: 20Gi

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

    serviceMonitor:
      enabled: true
