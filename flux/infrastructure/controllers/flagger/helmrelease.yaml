apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flagger
  namespace: flagger-system
spec:
  interval: 1h
  chart:
    spec:
      chart: flagger
      version: "1.40.0"
      sourceRef:
        kind: HelmRepository
        name: flagger
        namespace: flagger-system
      interval: 24h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Use Cilium Gateway API for traffic shifting (HTTPRoute weight).
    meshProvider: gatewayapi:v1

    # Prometheus metrics for canary analysis.
    # Point to your Prometheus instance when available.
    # metricsServer: http://prometheus-operated.monitoring:9090

    # Namespace selector — Flagger watches all namespaces.
    # Restrict to specific namespaces once product namespaces are known.
    # namespaceLabelSelector: "flagger.app/enabled=true"

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi
