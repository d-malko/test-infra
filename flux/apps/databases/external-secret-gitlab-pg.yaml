---
# Creates the secret used by CNPG to set the 'gitlab' user password on initdb.
# CNPG expects: { username, password }
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitlab-pg-app-secret
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: gitlab-pg-app-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: test-staging-gitlab-pg-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: test-staging-gitlab-pg-credentials
        property: password
---
# Creates the secret referenced by the GitLab HelmRelease (global.psql.password).
# Must live in the gitlab namespace — uses the same GCP secret.
# creationPolicy: Merge — will not overwrite the existing manually-created secret,
# only syncs the `password` key. Safe for already-bootstrapped clusters.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitlab-pg-secret
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: gitlab-pg-secret
    creationPolicy: Merge
  data:
    - secretKey: password
      remoteRef:
        # GCP Secret Manager secret (JSON): {"username":"gitlab","password":"..."}
        # Create with: gcloud secrets create test-staging-gitlab-pg-credentials \
        #   --data-file=- <<< '{"username":"gitlab","password":"<strong-password>"}'
        key: test-staging-gitlab-pg-credentials
        property: password
