apiVersion: v1
kind: Service
metadata:
  name: dev-pg-lb
  namespace: databases
  annotations:
    lbipam.cilium.io/sharing-key: "main-lb"
    lbipam.cilium.io/sharing-cross-namespace: "*"
spec:
  type: LoadBalancer
  loadBalancerIP: 51.195.15.0
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    cnpg.io/cluster: dev-pg
    role: primary
