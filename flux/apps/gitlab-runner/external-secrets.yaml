---
# GitLab Runner registration token.
# GCP secret name: test-staging-gitlab-runner-token
# Create with: gcloud secrets create test-staging-gitlab-runner-token --data-file=-
# Value: the runner authentication token from GitLab (Settings → CI/CD → Runners)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitlab-runner-token
  namespace: gitlab-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: gitlab-runner-token
    creationPolicy: Owner
  data:
    - secretKey: runner-registration-token
      remoteRef:
        key: test-staging-gitlab-runner-token
    - secretKey: runner-token
      remoteRef:
        key: test-staging-gitlab-runner-token
---
# S3 cache credentials for the runner (MinIO inside the cluster).
# GCP secret name: test-staging-gitlab-runner-cache-s3
# Create with: gcloud secrets create test-staging-gitlab-runner-cache-s3 \
#   --data-file=- <<< '{"accessKey":"<minio-access-key>","secretKey":"<minio-secret-key>"}'
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitlab-runner-cache-s3
  namespace: gitlab-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: gitlab-runner-cache-s3
    creationPolicy: Owner
  data:
    - secretKey: accessKey
      remoteRef:
        key: test-staging-gitlab-runner-cache-s3
        property: accessKey
    - secretKey: secretKey
      remoteRef:
        key: test-staging-gitlab-runner-cache-s3
        property: secretKey
